{% extends 'tournament/base.html' %}
{% block title %}Admin Login &mdash; SkyCharan Tournament System{% endblock %}

{% block content %}
<section class="login-section">
    <div class="login-card glass">
        <div class="login-header">
            <span class="logo-icon-lg">&#127951;</span>
            <h1 class="login-title">Admin Login</h1>
            <p class="login-subtitle">Sign in to manage the tournament</p>
        </div>
        <form method="post" class="login-form">
            {% csrf_token %}
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" required autofocus placeholder="Enter username">
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" required placeholder="Enter password">
            </div>
            <button type="submit" class="btn btn-primary btn-block">Login</button>
        </form>
        <a href="{% url 'home' %}" class="back-link-center">&larr; Back to Home</a>
    </div>
</section>
{% endblock %}
